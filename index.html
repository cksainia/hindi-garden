<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hindi Slayer">
<meta name="theme-color" content="#0d0a1f">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<title>Huntrix Aria · Hindi Slayer</title>
<style>
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
:root{
--bg1:#0d0a1f; --bg2:#160d2e; --bg3:#1d0f33;
--ink:#f5edff; --muted:#b8a6dc;
--card:#1b1330; --cardGlass:rgba(40,22,74,.55); --soft:#241640; --line:rgba(255,255,255,.10);
--pink:#ff2d95; --magenta:#ff4fb0; --purple:#9b3cff; --violet:#7a3cff;
--cyan:#36e6ff; --gold:#ffd24a; --good:#3fe3a0; --bad:#ff6f8d;
--glowPink:rgba(255,45,149,.45); --glowPurple:rgba(155,60,255,.42);
--shadow:rgba(0,0,0,.45); --shadowS:rgba(0,0,0,.30);
}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:var(--ink);}
body{
background:
radial-gradient(circle at 18% -4%, rgba(155,60,255,.30), transparent 42%),
radial-gradient(circle at 86% 6%, rgba(255,45,149,.24), transparent 40%),
radial-gradient(circle at 50% 108%, rgba(54,230,255,.14), transparent 46%),
linear-gradient(165deg,#0d0a1f 0%, #160d2e 52%, #1d0f33 100%);
overflow:hidden;
}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:760px;margin:0 auto;position:relative;}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 18px 48px;}
.hidden{display:none!important;}

/* Top bar */
.topbar{display:flex;align-items:center;gap:8px;padding:12px 16px 4px;}
.pill{background:var(--cardGlass);border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-weight:800;
backdrop-filter:blur(8px);box-shadow:0 2px 14px var(--shadowS), inset 0 0 0 1px rgba(255,255,255,.03);
display:flex;align-items:center;gap:7px;font-size:15px;color:var(--ink);}
.pill.star{box-shadow:0 0 16px var(--glowPink), inset 0 0 0 1px rgba(255,255,255,.04);border-color:rgba(255,45,149,.45);}
.pill.lvl{box-shadow:0 0 16px var(--glowPurple), inset 0 0 0 1px rgba(255,255,255,.04);border-color:rgba(155,60,255,.45);}
.pill .ico{font-size:17px;}
.spacer{flex:1;}
.iconbtn{background:var(--cardGlass);border:1px solid var(--line);border-radius:50%;width:44px;height:44px;font-size:19px;
backdrop-filter:blur(8px);box-shadow:0 2px 12px var(--shadowS);color:var(--ink);cursor:pointer;transition:transform .12s, box-shadow .15s;}
.iconbtn:active{transform:scale(.93);}

h1{font-size:27px;font-weight:900;margin:6px 0 2px;text-align:center;letter-spacing:-.4px;
background:linear-gradient(92deg,#ff2d95,#9b3cff 55%,#36e6ff);-webkit-background-clip:text;background-clip:text;color:transparent;
text-shadow:0 0 28px rgba(155,60,255,.30);}
.sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:10px;font-weight:600;letter-spacing:.3px;}

/* Top row: Word of the Day + Level side by side */
.topRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:stretch;margin-bottom:12px;}
.topRow > .wotd{margin-bottom:0;height:100%;}
.topRow > #levelBanner{margin-bottom:0;height:100%;}

/* Level banner */
#levelBanner{position:relative;overflow:hidden;border-radius:18px;padding:14px;margin-bottom:16px;
background:linear-gradient(135deg, rgba(255,45,149,.20), rgba(155,60,255,.22) 55%, rgba(54,230,255,.14));
border:1px solid rgba(255,255,255,.12);box-shadow:0 10px 30px var(--shadow), 0 0 24px rgba(155,60,255,.20) inset;}
#levelBanner::after{content:"";position:absolute;inset:-40% -10% auto auto;width:180px;height:180px;
background:radial-gradient(circle, rgba(255,45,149,.35), transparent 65%);filter:blur(8px);pointer-events:none;}
.lvlTop{display:flex;align-items:center;gap:10px;}
.lvlBadge{font-size:26px;width:46px;height:46px;flex:0 0 auto;border-radius:14px;display:flex;align-items:center;justify-content:center;
background:linear-gradient(145deg,#ff2d95,#9b3cff);box-shadow:0 6px 18px var(--glowPink), inset 0 0 0 2px rgba(255,255,255,.18);}
.lvlTitle{font-weight:900;font-size:17px;line-height:1.1;}
.lvlName{font-size:12px;color:var(--gold);font-weight:800;letter-spacing:.4px;margin-top:2px;text-shadow:0 0 10px rgba(255,210,74,.4);}
.lvlBar{height:9px;background:rgba(0,0,0,.30);border-radius:999px;margin-top:11px;overflow:hidden;border:1px solid rgba(255,255,255,.08);}
.lvlBar > i{display:block;height:100%;width:0;border-radius:999px;transition:width .6s cubic-bezier(.2,.8,.2,1);
background:linear-gradient(90deg,#ffd24a,#ff2d95 55%,#9b3cff);box-shadow:0 0 12px var(--glowPink);}
.lvlHint{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:7px;text-align:center;}

/* Dashboard live tiles — one row */
.sectionTitle{font-size:13px;font-weight:900;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin:14px 2px 8px;}
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:4px;}
.tile{position:relative;overflow:hidden;border-radius:15px;padding:12px 9px;border:1px solid var(--line);
background:linear-gradient(150deg, var(--cardGlass), rgba(20,12,40,.65));box-shadow:0 6px 20px var(--shadowS);}
.tile .tn{font-size:23px;font-weight:900;line-height:1;letter-spacing:-.5px;}
.tile .tl{font-size:10.5px;font-weight:700;color:var(--muted);margin-top:5px;line-height:1.15;}
.tile .tIco{position:absolute;top:9px;right:9px;font-size:14px;opacity:.85;}
.tile.t-words .tn{color:#36e6ff;text-shadow:0 0 16px rgba(54,230,255,.45);}
.tile.t-today .tn{color:#3fe3a0;text-shadow:0 0 16px rgba(63,227,160,.40);}
.tile.t-stars .tn{color:#ffd24a;text-shadow:0 0 16px rgba(255,210,74,.45);}
.tile.t-topics .tn{color:#ff4fb0;text-shadow:0 0 16px rgba(255,79,176,.45);}

/* Topic tiles */
.units{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:12px;}
.unit{position:relative;background:linear-gradient(155deg, var(--cardGlass), rgba(18,11,36,.7));border:1px solid var(--line);
border-radius:16px;padding:14px 10px;text-align:center;box-shadow:0 4px 16px var(--shadowS);transition:transform .12s, box-shadow .15s;cursor:pointer;}
.unit:active{transform:translateY(2px);}
.unit.mastered{border-color:rgba(255,210,74,.55);box-shadow:0 0 18px rgba(255,210,74,.22), 0 4px 16px var(--shadowS);}
.unit .emoji{font-size:32px;display:block;margin-bottom:6px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4));}
.unit .name{font-weight:800;font-size:13.5px;line-height:1.2;color:var(--ink);}
.unit .prog{font-size:11px;color:var(--muted);margin-top:5px;font-weight:700;}
.unit .bar{height:5px;background:rgba(0,0,0,.30);border-radius:6px;margin-top:8px;overflow:hidden;}
.unit .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));width:0;border-radius:6px;transition:width .4s;box-shadow:0 0 8px var(--glowPurple);}
.unit .crown{font-size:13px;}

/* Lesson menu */
.actBtn{display:flex;align-items:center;gap:14px;width:100%;border:1px solid var(--line);border-radius:16px;
background:linear-gradient(150deg, var(--cardGlass), rgba(18,11,36,.7));
padding:15px;margin-bottom:11px;box-shadow:0 4px 16px var(--shadowS);text-align:left;cursor:pointer;transition:transform .12s, box-shadow .15s;color:var(--ink);}
.actBtn:active{transform:translateY(2px);}
.actBtn .big{font-size:26px;width:50px;height:50px;display:flex;align-items:center;justify-content:center;border-radius:13px;
background:linear-gradient(145deg,rgba(255,45,149,.25),rgba(155,60,255,.30));flex:0 0 auto;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);}
.actBtn .t{font-weight:800;font-size:16px;}
.actBtn .d{font-size:13px;color:var(--muted);font-weight:600;}

/* Cards / activities */
.card{background:linear-gradient(155deg, var(--cardGlass), rgba(16,10,32,.78));border:1px solid var(--line);border-radius:20px;
padding:26px 22px;box-shadow:0 8px 26px var(--shadowS), 0 0 22px rgba(155,60,255,.10) inset;text-align:center;margin-bottom:16px;}
.bigEmoji{font-size:80px;line-height:1.1;margin:4px 0;filter:drop-shadow(0 6px 16px rgba(0,0,0,.5));}
.hindi{font-size:37px;font-weight:900;margin:4px 0;letter-spacing:-.5px;color:#fff;text-shadow:0 0 18px rgba(155,60,255,.35);}
.roman{font-size:21px;color:var(--magenta);font-weight:800;}
.english{font-size:17px;color:var(--muted);margin-top:6px;font-weight:700;}
.speakBtn{background:linear-gradient(135deg,#ff2d95,#9b3cff);color:#fff;border:none;border-radius:12px;padding:12px 22px;font-size:15px;font-weight:800;
margin-top:16px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;box-shadow:0 6px 18px var(--glowPink);transition:transform .12s;}
.speakBtn:active{transform:scale(.97);}

.options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
.opt{background:linear-gradient(155deg, var(--cardGlass), rgba(16,10,32,.78));border:2px solid var(--line);border-radius:16px;padding:18px 10px;font-size:38px;
box-shadow:0 4px 14px var(--shadowS);cursor:pointer;transition:transform .12s,border-color .15s,box-shadow .15s;color:var(--ink);}
.opt .lab{display:block;font-size:14px;font-weight:700;color:var(--ink);margin-top:6px;}
.opt:active{transform:translateY(2px);}
.opt.correct{border-color:var(--good);box-shadow:0 0 20px rgba(63,227,160,.45);}
.opt.wrong{border-color:var(--bad);opacity:.7;}

.prompt{font-size:16px;font-weight:800;color:var(--muted);margin:6px 0 14px;text-align:center;}

/* progress dots */
.dots{display:flex;gap:5px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);}
.dot.done{background:var(--good);box-shadow:0 0 8px rgba(63,227,160,.6);}
.dot.now{background:var(--magenta);transform:scale(1.35);box-shadow:0 0 10px var(--glowPink);}

.backBtn{background:var(--cardGlass);border:1px solid var(--line);border-radius:999px;padding:9px 15px;font-weight:700;font-size:14px;
backdrop-filter:blur(8px);box-shadow:0 2px 12px var(--shadowS);display:inline-flex;align-items:center;gap:6px;color:var(--ink);cursor:pointer;}

.footerBtn{position:sticky;bottom:0;width:100%;background:linear-gradient(92deg,#ff2d95,#9b3cff 60%,#7a3cff);color:#fff;border:none;border-radius:14px;
padding:16px;font-size:16px;font-weight:800;box-shadow:0 10px 26px var(--glowPink);margin-top:8px;cursor:pointer;transition:transform .12s;}
.footerBtn:active{transform:translateY(2px);}
.footerBtn:disabled{background:#3a2c52;box-shadow:none;color:rgba(255,255,255,.6);}

/* Reward overlay */
.overlay{position:fixed;inset:0;background:rgba(8,5,18,.66);backdrop-filter:blur(7px);
display:flex;align-items:center;justify-content:center;z-index:50;padding:24px;}
.rewardCard{position:relative;overflow:hidden;border-radius:24px;padding:30px;text-align:center;max-width:360px;width:100%;
background:linear-gradient(160deg,#231542,#170d2e);border:1px solid rgba(255,255,255,.12);
box-shadow:0 24px 70px rgba(0,0,0,.6), 0 0 34px rgba(255,45,149,.25);animation:pop .4s;}
@keyframes pop{0%{transform:scale(0);}60%{transform:scale(1.18);}100%{transform:scale(1);}}
.rewardCard .grow{font-size:74px;animation:starPulse 1.4s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(255,210,74,.7));}
@keyframes starPulse{0%,100%{transform:scale(1) rotate(-6deg);}50%{transform:scale(1.18) rotate(6deg);}}
.rewardCard h2{font-size:22px;font-weight:900;margin:8px 0;color:#fff;}
.lvlUpTag{display:inline-block;margin:6px 0;padding:7px 16px;border-radius:999px;font-weight:900;font-size:15px;color:#1a0f2e;
background:linear-gradient(135deg,#ffd24a,#ff7ac0);box-shadow:0 0 22px rgba(255,210,74,.6);animation:starPulse 1.2s ease-in-out infinite;}
.confetti{position:fixed;top:-10px;font-size:22px;z-index:60;pointer-events:none;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh) rotate(360deg);}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#2a1850,#3a1c5e);color:#fff;
border:1px solid rgba(255,255,255,.14);padding:11px 18px;border-radius:999px;font-weight:700;z-index:70;font-size:14px;opacity:0;transition:opacity .3s;box-shadow:0 8px 24px var(--shadow);}
.toast.show{opacity:1;}
.encourage{font-size:16px;font-weight:800;color:var(--good);min-height:22px;margin-top:8px;text-shadow:0 0 12px rgba(63,227,160,.4);}

/* Word of the day */
.wotd{display:block;width:100%;text-align:left;border:1px solid rgba(255,255,255,.12);cursor:pointer;
background:linear-gradient(120deg, rgba(255,45,149,.16), rgba(155,60,255,.20));border-radius:18px;padding:14px;margin-bottom:16px;
box-shadow:0 6px 22px var(--shadowS), 0 0 18px rgba(155,60,255,.14) inset;}
.wotd .tag{font-size:11px;font-weight:900;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;text-shadow:0 0 10px rgba(255,210,74,.4);}
.wotd .row{display:flex;align-items:center;gap:12px;margin-top:8px;}
.wotd .wic{font-size:32px;filter:drop-shadow(0 3px 8px rgba(0,0,0,.4));}
.wotd .whi{font-size:22px;font-weight:900;color:#fff;}
.wotd .wro{font-size:15px;color:var(--magenta);font-weight:800;}
.wotd .wen{font-size:13px;color:var(--muted);font-weight:700;}
.wotd .hear{margin-left:auto;font-size:18px;background:linear-gradient(135deg,#ff2d95,#9b3cff);color:#fff;border-radius:50%;width:38px;height:38px;
display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:0 4px 14px var(--glowPink);}

/* Parent screen */
.pcard{background:linear-gradient(155deg, var(--cardGlass), rgba(16,10,32,.78));border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 6px 20px var(--shadowS);margin-bottom:14px;}
.statRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.stat{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:13px;padding:14px;text-align:center;}
.stat .n{font-size:25px;font-weight:900;color:var(--magenta);text-shadow:0 0 14px var(--glowPink);}
.stat .l{font-size:12px;font-weight:700;color:var(--muted);}
.cal{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.cal .day{width:32px;text-align:center;}
.cal .box{height:28px;border-radius:8px;background:rgba(0,0,0,.25);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:15px;}
.cal .box.on{background:linear-gradient(145deg,rgba(255,45,149,.4),rgba(155,60,255,.4));border-color:rgba(255,255,255,.18);}
.cal .dl{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px;}
.wordChips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
.chip{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700;color:var(--ink);}
/* Grammar / Sentence Builder */
.gtip{background:linear-gradient(150deg, rgba(255,45,149,.16), rgba(155,60,255,.20));border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;font-size:15px;font-weight:700;line-height:1.55;color:var(--ink);}
.gex{display:flex;align-items:center;gap:10px;background:linear-gradient(155deg,var(--cardGlass),rgba(18,11,36,.7));border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;cursor:pointer;}
.gex .ghi{font-size:19px;font-weight:900;color:#fff;}
.gex .gro{font-size:14px;color:var(--magenta);font-weight:800;}
.gex .gen{font-size:13px;color:var(--muted);font-weight:700;}
.gex .ghear{margin-left:auto;font-size:18px;}
.tray{min-height:58px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;padding:12px;border-radius:14px;border:1px dashed rgba(255,255,255,.25);background:rgba(0,0,0,.22);margin:6px 0 14px;}
.tray.empty::before{content:"tap the words below, in order";color:var(--muted);font-size:13px;font-weight:700;opacity:.7;}
.tray.good{border-style:solid;border-color:var(--good);box-shadow:0 0 22px rgba(63,227,160,.30);}
.bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:6px;}
.wtile{font-size:20px;font-weight:900;color:#fff;background:linear-gradient(145deg,rgba(255,45,149,.30),rgba(155,60,255,.34));border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:10px 14px;cursor:pointer;box-shadow:0 4px 14px var(--shadowS);transition:transform .1s;}
.wtile:active{transform:translateY(2px);}
.tray .wtile{background:linear-gradient(145deg,rgba(54,230,255,.24),rgba(155,60,255,.30));}

/* Collapsible landing sections */
.sectionCard{display:flex;align-items:center;gap:14px;width:100%;text-align:left;border:1px solid var(--line);border-radius:18px;
background:linear-gradient(150deg, rgba(255,45,149,.18), rgba(155,60,255,.22));padding:15px 18px;box-shadow:0 4px 16px var(--shadowS);cursor:pointer;color:var(--ink);transition:transform .12s, background .15s, box-shadow .15s;margin-top:2px;}
.sectionCard:active{transform:translateY(2px);}
.sectionCard.open{background:linear-gradient(150deg, rgba(255,45,149,.30), rgba(155,60,255,.34));box-shadow:0 0 20px rgba(155,60,255,.25), 0 4px 16px var(--shadowS);}
.sectionCard .scEmoji{font-size:27px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:13px;background:rgba(0,0,0,.28);flex:0 0 auto;}
.sectionCard .scText{display:flex;flex-direction:column;min-width:0;}
.sectionCard .scName{font-weight:900;font-size:18px;}
.sectionCard .scSub{font-size:12.5px;color:var(--muted);font-weight:700;margin-top:2px;}
.sectionCard .scChev{margin-left:auto;font-size:15px;color:var(--muted);font-weight:900;}
.scBar{height:5px;background:rgba(0,0,0,.3);border-radius:6px;margin-top:8px;overflow:hidden;}
.scBar > i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--magenta));border-radius:6px;transition:width .5s;}

/* Daily Quiz */
.qopts{display:flex;flex-direction:column;gap:10px;margin-top:6px;}
.qopt{width:100%;text-align:left;font-size:17px;font-weight:800;color:var(--ink);border:2px solid var(--line);border-radius:14px;padding:14px 16px;
background:linear-gradient(155deg, var(--cardGlass), rgba(16,10,32,.78));box-shadow:0 4px 14px var(--shadowS);cursor:pointer;transition:transform .12s, border-color .15s, box-shadow .15s;}
.qopt:active{transform:translateY(2px);}
.qopt.correct{border-color:var(--good);box-shadow:0 0 20px rgba(63,227,160,.45);}
.qopt.wrong{border-color:var(--bad);opacity:.75;}
.qpanel{background:linear-gradient(155deg, var(--cardGlass), rgba(16,10,32,.78));border:1px solid var(--line);border-radius:16px;padding:14px 16px;box-shadow:0 4px 16px var(--shadowS);}
.qpHead{font-weight:900;font-size:14px;margin-bottom:8px;}
.qpEmpty{font-size:13px;color:var(--muted);font-weight:700;line-height:1.5;}
.qrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid var(--line);}
.qrow .qd{font-size:12.5px;color:var(--muted);font-weight:700;width:92px;flex:0 0 auto;}
.qrow .qbar{flex:1;height:7px;background:rgba(0,0,0,.3);border-radius:6px;overflow:hidden;}
.qrow .qbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--purple));border-radius:6px;}
.qrow .qsc{font-size:14px;font-weight:900;width:56px;text-align:right;flex:0 0 auto;}
.qsc.g{color:var(--good);} .qsc.m{color:var(--gold);} .qsc.b{color:var(--bad);}

/* Grammar Arena games */
.auraRow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;}
.auraBtn{font-size:18px;font-weight:900;color:#fff;border-radius:16px;padding:18px 10px;cursor:pointer;line-height:1.5;border:2px solid var(--line);transition:transform .12s, box-shadow .15s;}
.auraBtn:active{transform:translateY(2px);}
.auraBtn.fAura{background:linear-gradient(150deg,rgba(255,45,149,.30),rgba(255,79,176,.16));border-color:rgba(255,45,149,.55);box-shadow:0 0 18px rgba(255,45,149,.35);}

<script>
/* ============ DATA ============ */
const CONGRATS = ["शाबाश! Shabash!","बहुत अच्छा! Wonderful!","Amazing, Aria!","You're a star! ⭐","कमाल! Brilliant!","Keep shining! 🌟","दमदार! Powerful!","Stage star! ✨"];
const LEVEL_NAMES = ["Rookie Star","Rising Star","Spark","Stage Star","Headliner","Star Hunter","Neon Idol","Superstar","Diamond Idol","Legend"];
const LEVEL_BADGES = ["🌟","✨","💫","⭐","🩷","💜","🗡️","👑","💎","🏆"];
const STARS_PER_LEVEL = 12;
// Spaced repetition: a word's review interval grows each time it's recalled correctly.
const SRS_STEPS = [1,3,7,16,35]; // days until next review, by step
const SKILL_OF = {aura:"gender endings", combo:"word order", respect:"polite speech", runes:"verb tenses", potion:"postpositions"};
// Achievements tied to real skills, not just time spent. got(state) derives earned status from progress.
const ACHIEVEMENTS = [
{id:"firstWords", emoji:"🌱", name:"First Words", desc:"Learn 10 words", got:s=>Object.keys(s.seen||{}).length>=10},
{id:"wordCollector", emoji:"📚", name:"Word Collector", desc:"Learn 50 words", got:s=>Object.keys(s.seen||{}).length>=50},
{id:"listener", emoji:"👂", name:"Sharp Ears", desc:"Master 15 words in Listen & Find", got:s=>Object.keys(s.mastered||{}).length>=15},
{id:"auraAdept", emoji:"🩷", name:"Aura Adept", desc:"Clear Aura Match (gender endings)", got:s=>!!(s.done||{})["game_aura"]},
{id:"verbNinja", emoji:"🥷", name:"Verb-Last Ninja", desc:"Win Combo Chains (word order)", got:s=>!!(s.done||{})["game_combo"]},
{id:"politePro", emoji:"🛡️", name:"Politeness Pro", desc:"Clear Respect Shield (aap/tum)", got:s=>!!(s.done||{})["game_respect"]},
{id:"timeBender", emoji:"⏳", name:"Time-Bender", desc:"Clear Time Runes (tenses)", got:s=>!!(s.done||{})["game_runes"]},
{id:"potionMaster", emoji:"⚗️", name:"Potion Master", desc:"Clear Potion Lab (postpositions)", got:s=>!!(s.done||{})["game_potion"]},
{id:"sentenceSmith", emoji:"✍️", name:"Sentence Smith", desc:"Finish 5 Sentence Builder lessons", got:s=>(typeof GRAMMAR!=="undefined"?GRAMMAR:[]).filter(g=>(s.done||{})["grammar_"+g.id]).length>=5},
{id:"convoActor", emoji:"🎭", name:"Conversation Actor", desc:"Act out 3 conversations", got:s=>(typeof CONVOS!=="undefined"?CONVOS:[]).filter(c=>(s.done||{})["convo_"+c.id]).length>=3},
{id:"onFire", emoji:"🔥", name:"On Fire", desc:"Practice on 3 different days", got:s=>Object.keys(s.log||{}).length>=3},
{id:"memoryMaster", emoji:"🧠", name:"Memory Master", desc:"Lock 10 words into long-term memory", got:s=>srsLongTermCount()>=10},
{id:"pathWalker", emoji:"🗺️", name:"Path Walker", desc:"Finish a Daily Path", got:s=>Object.keys(s.pathDone||{}).length>=1},
];

/* ============ STATE ============ */
const SAVE_KEY = "ariaHindiGarden_v1";
let state = loadState();
let muted = false;
let currentUnit = null;

/* ============ DEVICE SYNC (Cloudflare Worker + KV) ============ */
const SYNC_URL = "https://hindi-hop-sync.chitresh.workers.dev/";
const SYNC_CODE_KEY = "hindiHopSyncCode";
let syncCode = ""; try{ syncCode = localStorage.getItem(SYNC_CODE_KEY) || ""; }catch(e){}
let syncTimer = null;

function loadState(){
let s = null;
try{ s = JSON.parse(localStorage.getItem(SAVE_KEY)); }catch(e){}
if(!s || typeof s!=="object") s = {};
// base / legacy fields preserved
s.done = s.done || {};
s.log = s.log || {};
s.seen = s.seen || {};
// ---- graceful migration to Star Stage ----
// old currency was "sun"; carry it forward as starting stars so progress is never lost
if(typeof s.stars !== "number"){ s.stars = (typeof s.sun==="number") ? s.sun : 0; }
// mastered words: { ro: "YYYY-MM-DD" } — date a word was first nailed in Listen & Find
if(!s.mastered || typeof s.mastered!=="object") s.mastered = {};
// quiz history: [{date, score, total, pct, t}]
if(!Array.isArray(s.quizzes)) s.quizzes = [];
// words she missed (quiz/listen) — to "win back": { ro: {en, t} }
if(!s.missed || typeof s.missed!=="object") s.missed = {};
// per-word mastery ladder: 1 Seen · 2 Heard · 3 Recognized · 4 Slayed
if(!s.wordLevel || typeof s.wordLevel!=="object") s.wordLevel = {};
// first-seen date per word { ro: "YYYY-MM-DD" } for spaced review
if(!s.seenDate || typeof s.seenDate!=="object") s.seenDate = {};
// settings
if(typeof s.speed !== "number") s.speed = 0.85;
if(s.scriptMode!=="deva" && s.scriptMode!=="both") s.scriptMode = "both";
// Grammar Arena mistake counters by game type (for parent "needs practice")
if(!s.gameMiss || typeof s.gameMiss!=="object") s.gameMiss = {};
// Spaced repetition schedule per word: { ro: {step, due:"YYYY-MM-DD", reps, lapses} }
if(!s.srs || typeof s.srs!=="object") s.srs = {};
// Daily Learning Path completion per day, and earned achievement badges
if(!s.pathDone || typeof s.pathDone!=="object") s.pathDone = {};
if(!s.achievements || typeof s.achievements!=="object") s.achievements = {};
// which Culture Corner bites she's opened
if(!s.cultureSeen || typeof s.cultureSeen!=="object") s.cultureSeen = {};
// Backfill SRS for already-learned words, spacing them by how well she knows them
for(const ro in s.seen){ if(!s.srs[ro]){ const lvl=(s.wordLevel&&s.wordLevel[ro])||1; const step=Math.max(0,Math.min(SRS_STEPS.length-1, lvl-1)); const base=(s.seenDate&&s.seenDate[ro])||todayKey(); s.srs[ro]={step, due:addDaysKey(base, SRS_STEPS[step]), reps:0, lapses:0}; } }
// backfill seenDate for already-learned words (so review has something to work with)
for(const ro in s.seen){ if(!s.seenDate[ro]) s.seenDate[ro]=todayKey(); if(!s.wordLevel[ro]) s.wordLevel[ro]=(s.mastered&&s.mastered[ro])?3:1; }
// keep legacy keys (sun, plants) untouched so nothing is wiped
return s;
}
function saveState(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){} if(typeof syncPushSoon==="function") syncPushSoon(); }

/* ============ SPEECH ============ */
let hiVoice = null;
function pickVoice(){
const vs = speechSynthesis.getVoices();
hiVoice = vs.find(v=>v.lang==="hi-IN") || vs.find(v=>v.lang && v.lang.toLowerCase().startsWith("hi")) || null;
}
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged = pickVoice; }
function speak(text, rate){
if(muted || !('speechSynthesis' in window)) return;
try{
speechSynthesis.cancel();
const u = new SpeechSynthesisUtterance(text);
u.lang = "hi-IN"; if(hiVoice) u.voice = hiVoice;
u.rate = (typeof rate==="number") ? rate : ((state&&typeof state.speed==="number")?state.speed:.85);
u.pitch = 1.05;
speechSynthesis.speak(u);
}catch(e){}
}
function speakSlow(text){ const base=(state&&typeof state.speed==="number")?state.speed:.85; speak(text, Math.max(0.3, base*0.5)); }

/* ============ HELPERS ============ */
const $ = id => document.getElementById(id);
function show(screen){ clearToast(); ["homeScreen","menuScreen","actScreen","parentScreen"].forEach(s=>$(s).classList.add("hidden")); $(screen).classList.remove("hidden"); $(screen).scrollTop=0; }
function todayKey(d){ d=d||new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function addDaysKey(key,days){ const p=(key||todayKey()).split("-"); const d=new Date(+p[0],(+p[1])-1,+p[2]); d.setDate(d.getDate()+days); return todayKey(d); }
function dateAdd(days){ return addDaysKey(todayKey(),days); }
// schedule a word's first review when she first meets it
function srsInit(ro){ if(!ro) return; state.srs=state.srs||{}; if(!state.srs[ro]) state.srs[ro]={step:0, due:dateAdd(1), reps:0, lapses:0}; }
// update a word's schedule after a recall attempt (correct grows the interval; wrong resets it)
function srsReview(ro, correct){
if(!ro) return; state.srs=state.srs||{};
const s = state.srs[ro] || {step:0, due:todayKey(), reps:0, lapses:0};
if(correct){ s.reps=(s.reps||0)+1; s.step=Math.min((s.step||0)+1, SRS_STEPS.length-1); s.due=dateAdd(SRS_STEPS[s.step]); }
else { s.lapses=(s.lapses||0)+1; s.step=0; s.due=dateAdd(1); }
state.srs[ro]=s;
}
function srsDuePool(){ const t=todayKey(); state.srs=state.srs||{}; return ALL_WORDS.filter(w=> state.seen&&state.seen[w.ro] && state.srs[w.ro] && state.srs[w.ro].due<=t); }
function srsLongTermCount(){ let c=0; for(const ro in (state.srs||{})){ if(state.seen&&state.seen[ro] && (state.srs[ro].step||0)>=SRS_STEPS.length-1) c++; } return c; }
function daysSinceActive(){ for(let i=0;i<90;i++){ if((state.log||{})[addDaysKey(todayKey(),-i)]) return i; } return 99; }
// award any newly-earned badges and gently announce them
function checkAchievements(){
state.achievements=state.achievements||{};
const newly=[];
ACHIEVEMENTS.forEach(a=>{ try{ if(!state.achievements[a.id] && a.got(state)){ state.achievements[a.id]=todayKey(); newly.push(a); } }catch(e){} });
if(newly.length){ saveState(); if(newly.length>2){ setTimeout(()=>toast("🏆 "+newly.length+" new badges earned!"), 500); } else { newly.forEach((a,i)=> setTimeout(()=>toast("🏆 New badge: "+a.name+"!"), 600*(i+1))); } }
return newly;
}
// 0-100 score per skill, derived from word levels + game performance
function skillScores(){
const seen=Math.max(1, Object.keys(state.seen||{}).length);
const lv=state.wordLevel||{}; const atLeast=(n)=>Object.values(lv).filter(v=>v>=n).length;
const masteredW=Object.keys(state.mastered||{}).length;
const miss=state.gameMiss||{}; const gdone=(id)=>!!(state.done||{})["game_"+id];
const gscore=(id)=> gdone(id)? Math.max(20, 100-(miss[id]||0)*8) : 0;
const gr=(typeof GRAMMAR!=="undefined"?GRAMMAR:[]); const sbDone=gr.filter(x=>(state.done||{})["grammar_"+x.id]).length;
const sbScore=gr.length?Math.round(100*sbDone/gr.length):0;
return [
{name:"Vocabulary", emoji:"📚", pct:Math.min(100,Math.round(100*atLeast(3)/seen))},

function checkListen(btn, chosen, correct){
if(btn.dataset.locked) return;
if(chosen.en===correct.en){
btn.classList.add("correct"); lesson.correct++;
if(!lesson.cardMissed){ // clean first-try recall → advance her schedule & win it off the list
if(state.missed) delete state.missed[correct.ro];
srsReview(correct.ro, true);
if(markMastered(correct.ro)){ lesson.newMastered++; }
} // if she'd missed it first, it stays flagged for a future win-back
$("enc").textContent=CONGRATS[Math.floor(Math.random()*CONGRATS.length)]+" — "+correct.hi+" ("+correct.ro+")";
[...$("opts").children].forEach(c=>c.dataset.locked=1);
setTimeout(nextStep,1000);
}else{
btn.classList.add("wrong"); btn.dataset.locked=1;
if(!lesson.cardMissed){ lesson.cardMissed=true; srsReview(correct.ro, false); state.missed=state.missed||{}; state.missed[correct.ro]={en:correct.en, t:Date.now()}; saveState(); }
$("enc").textContent="Almost! Listen again and try 🌟"; // no penalty, ever
speakSlow(correct.hi);
}
}

function finishActivity(){
// pace-friendly reward: ~1 star per 10 words, plus a small capped bonus for newly mastered words
let earned = Math.max(1, Math.ceil(lesson.words.length/10));
if(lesson.newMastered) earned += Math.min(2, Math.ceil(lesson.newMastered/8));
state.done[lesson.unitId+"_"+lesson.kind] = (state.done[lesson.unitId+"_"+lesson.kind]||0)+1;

function loadBuild(){

function buildTap(id){
if(gb.checked&&gb.ok) return;

if(i>=0) gb.tray.splice(i,1); else gb.tray.push(id);
gb.checked=false; renderBuild();
}
function buildReset(){ if(gb.checked&&gb.ok) return; gb.tray=[]; gb.checked=false; renderBuild(); }
function buildCheck(){
const b=gb.builds[gb.idx];
const made=gb.tray.map(id=>gb.tiles.find(t=>t.id===id).w);
gb.checked=true; gb.ok=(made.join("|")===b.words.join("|"));
if(gb.ok){ gb.correct++; speak(b.words.join(" ")); setTimeout(buildNext,1500); }
renderBuild();
}
function buildNext(){ gb.idx++; if(gb.idx>=gb.builds.length){ finishBuild(); return; } loadBuild(); }
function finishBuild(){
state.done["grammar_"+gb.id]=(state.done["grammar_"+gb.id]||0)+1;
logActivity([]);
const earned=Math.min(4, Math.max(2, gb.correct));
const res=addStars(earned);
showReward(earned, res.leveledUp, res.newLevel, 0);
}

const trayCls="tray"+(gb.tray.length?"":" empty")+(gb.checked&&gb.ok?" good":"");
const full=(gb.tray.length===b.words.length);
let msg="";
if(gb.checked&&gb.ok) msg=`<div class="encourage">${CONGRATS[Math.floor(Math.random()*CONGRATS.length)]}</div><div class="qpEmpty" style="margin-top:6px;text-align:center">💡 Why this order? ${gb.tip}</div>`;

${msg}

/* --- Aura Match --- */
function renderAura(){
const r=game.rounds[game.idx];

<div class="card"><div style="font-size:13px;color:var(--muted);font-weight:800">${r.en}</div><div class="hindi" lang="hi" style="margin-top:6px">${r.prompt}</div></div>
<div class="auraRow">
<button class="auraBtn fAura ${game.done&&r.ans==='f'?'hit':''}" ${game.done?'':`onclick="auraPick('f')"`}>🩷 girl form<br><span lang="hi">${r.optF}</span></button>

</div>${fb}`);

function auraPick(g){

/* --- Combo Chains --- */
function renderCombo(){
const r=game.rounds[game.idx];
if(!game.tiles){ game.tiles=shuffle([{hi:r.s,role:'S'},{hi:r.o,role:'O'},{hi:r.v,role:'V'}]); game.slots=[]; }
const labels=["🥷 Fighter (who)","🎯 Target (what)","⚔️ Attack (verb!)"];
const slotsHtml=labels.map((lab,i)=>{ const f=game.slots[i]; return `<div class="comboSlot ${f?'filled':''}" ${f?`onclick="comboUnplace(${i})"`:''}><div class="csLab">${lab}</div><div class="csVal" lang="hi">${f?f.hi:'—'}</div></div>`; }).join("");
const bankHtml=game.tiles.map((t,i)=> game.slots.indexOf(t)>=0?"":`<button class="wtile" lang="hi" onclick="comboPlace(${i})">${t.hi}</button>`).join("");
const full=game.slots.length===3;
let fb="";
if(game.done) fb=`<div class="encourage">💥 Critical Hit! <span lang="hi">${r.s} ${r.o} ${r.v}</span></div>`;
else if(game.checked){
const expect=['S','O','V']; const want={S:r.s,O:r.o,V:r.v}; const lab=["Fighter","Target","Attack"];
let wi=game.slots.map(t=>t.role).findIndex((rl,i)=>rl!==expect[i]);
if(wi<0) wi=0;
fb=`<div class="encourage" style="color:var(--bad)">Not yet — the <b>${lab[wi]}</b> slot should be “<span lang="hi">${want[expect[wi]]}</span>”. Tap a filled slot to send it back. ⚔️</div>`;
}
const hint = (!game.done && game.slots.length>0) ? `<div class="qpEmpty" style="text-align:center;margin:2px 0">↩︎ Tap a filled slot to send that word back</div>` : "";
gameShell(`<div class="prompt">Chain the combo: “${r.en}”</div>
<div class="comboSlots">${slotsHtml}</div>
${hint}
<div class="bank">${bankHtml}</div>
<div style="display:flex;justify-content:center;margin-top:2px">${game.slots.length&&!game.done?'<button class="backBtn" onclick="comboClear()">↺ Reset</button>':''}</div>
${fb}
<button class="footerBtn" ${full?'':'disabled'} onclick="comboCheck()">${game.done?'Critical! 💥':'Strike! ⚔️'}</button>`);
}
function comboPlace(i){ if(game.done) return; const t=game.tiles[i]; if(game.slots.indexOf(t)<0 && game.slots.length<3){ game.slots.push(t); game.checked=false; renderCombo(); } }
function comboUnplace(i){ if(game.done) return; game.slots.splice(i,1); game.checked=false; renderCombo(); }
function comboClear(){ if(game.done) return; game.slots=[]; game.checked=false; renderCombo(); }
function comboCheck(){
if(game.slots.length<3) return;
const roles=game.slots.map(t=>t.role).join("");
game.checked=true;
if(roles==="SOV"){ game.score++; game.done=true; const r=game.rounds[game.idx]; speak(r.s+" "+r.o+" "+r.v); renderCombo(); setTimeout(gameNext,1500); }
else { gameMiss('combo'); renderCombo(); }
}

/* ============ DAILY QUIZ ============ */
let quiz=null;
function learnedWords(){ return ALL_WORDS.filter(w=>state.seen && state.seen[w.ro]); }
function buildQuiz(){
const learned = learnedWords();
const allW = ALL_WORDS; // decoys can come from anywhere
function distinct(pool,key,exclude,n){
const seen=new Set([exclude]); const out=[];

return out;
}

let wkWords=0; for(const ro in (state.seenDate||{})){ if(state.seenDate[ro]>=wk) wkWords++; }
const wkQ=(state.quizzes||[]).filter(q=>q.date>=wk); const wkAcc=wkQ.length?Math.round(wkQ.reduce((a,q)=>a+q.pct,0)/wkQ.length):null;
let wkDays=0; for(let i=0;i<7;i++){ const d=new Date(today.getTime()-i*86400000); if((state.log||{})[todayKey(d)]) wkDays++; }
const touched=new Set(); UNITS.forEach(u=>{ if(state.done[u.id+"_learn"]||state.done[u.id+"_listen"]||state.done[u.id+"_say"]) touched.add(u.id); });
return `<div class="pcard"><div style="font-weight:900;font-size:17px">This week 📅</div><div class="statRow" style="grid-template-columns:repeat(4,1fr);margin-top:10px"><div class="stat"><div class="n">${wkWords}</div><div class="l">new words</div></div><div class="stat"><div class="n">${wkDays}/7</div><div class="l">days practiced</div></div><div class="stat"><div class="n">${touched.size}</div><div class="l">topics touched</div></div><div class="stat"><div class="n">${wkAcc===null?'—':wkAcc+'%'}</div><div class="l">quiz accuracy</div></div></div></div>`; })()}
${(()=>{ const srs=state.srs||{}; const t=todayKey(); let due=0,learning=0,longterm=0;
for(const ro in srs){ if(!state.seen||!state.seen[ro]) continue; const s=srs[ro]; if((s.step||0)>=SRS_STEPS.length-1) longterm++; else learning++; if(s.due<=t) due++; }
return `<div class="pcard"><div style="font-weight:900;font-size:17px">Memory &amp; review 🧠</div><div style="font-size:13px;opacity:.78;font-weight:700;margin-top:2px">Spaced practice brings each word back right before she'd forget it — that's what makes it stick.</div><div class="statRow" style="grid-template-columns:repeat(3,1fr);margin-top:10px"><div class="stat"><div class="n">${due}</div><div class="l">ready to review</div></div><div class="stat"><div class="n">${learning}</div><div class="l">still learning</div></div><div class="stat"><div class="n">${longterm}</div><div class="l">long-term 🌟</div></div></div></div>`; })()}
${(()=>{ const sk=skillScores();
const rows=sk.map(s=>`<div class="skrow"><span class="skname">${s.emoji} ${s.name}</span><span class="skbar"><i style="width:${s.pct}%"></i></span><span class="skpct">${s.pct}%</span></div>`).join("");
return `<div class="pcard"><div style="font-weight:900;font-size:17px">Skill map 🗺️</div><div style="font-size:13px;opacity:.78;font-weight:700;margin:2px 0 8px">Progress by skill, not just topic — so you can see what's strong and what needs love.</div>${rows}</div>`; })()}
${(()=>{ const earned=state.achievements||{}; const n=Object.keys(earned).length;
const chips=ACHIEVEMENTS.map(a=>`<span class="badgeChip ${earned[a.id]?'got':''}">${earned[a.id]?a.emoji:'🔒'} ${a.name}</span>`).join("");
return `<div class="pcard"><div style="font-weight:900;font-size:17px">Badges 🏆 · ${n}/${ACHIEVEMENTS.length}</div><div style="font-size:13px;opacity:.78;font-weight:700;margin:2px 0 8px">Earned for real skills, never just for time spent.</div><div class="badgeChips">${chips}</div></div>`; })()}
${(()=>{ const gs=(typeof GAMES!=="undefined"?GAMES:[]); if(!gs.length) return "";
const miss=state.gameMiss||{};
const played=gs.filter(g=>state.done["game_"+g.id]); const tried=played.length;
let strongest=null,needs=null;
played.forEach(g=>{ const m=miss[g.id]||0; if(strongest===null||m<(miss[strongest.id]||0)) strongest=g; if(needs===null||m>(miss[needs.id]||0)) needs=g; });
const untried=gs.filter(g=>!state.done["game_"+g.id]);
const strongLabel = tried? strongest.name : "—";
const needsLabel = untried.length? untried[0].name+" (not tried yet)" : (needs && (miss[needs.id]||0)>0 ? needs.name : "—");
const rows=gs.map(g=>{ const done=state.done["game_"+g.id]; const m=miss[g.id]||0; return `<div class="qrow"><span class="qd">${g.emoji} ${g.name}</span><span class="qbar"><i style="width:${done?100:0}%"></i></span><span class="qsc ${done?'g':'b'}">${done?(m>0?m+' miss':'✓'):'—'}</span></div>`; }).join("");
const sb=(typeof GRAMMAR!=="undefined"?GRAMMAR:[]); const sbDone=sb.filter(x=>state.done['grammar_'+x.id]).length;
return `<div class="pcard"><div style="font-weight:900;font-size:17px">Grammar Arena 🕹️ · ${tried}/${gs.length} games tried</div>
<div style="font-size:13px;font-weight:700;margin:6px 0 6px"><span style="color:var(--good)">💪 Strongest:</span> ${strongLabel}<br><span style="color:var(--gold)">🎯 Needs practice:</span> ${needsLabel}</div>
${rows}
<div style="font-size:12.5px;opacity:.75;font-weight:700;margin-top:8px">✍️ Sentence Builder: ${sbDone}/${sb.length} lessons done</div></div>`; })()}
${(()=>{ const l=state.quizzes||[];
if(!l.length) return `<div class="pcard"><div style="font-weight:900;font-size:17px">Quiz scores 🎯</div><div style="font-size:14px;opacity:.78;font-weight:700;margin-top:4px">No quizzes yet. Have her take a Daily Quiz to start tracking how much she's actually learning over time.</div></div>`;
const best=Math.max(...l.map(q=>q.pct)), avg=Math.round(l.reduce((a,q)=>a+q.pct,0)/l.length);
const first=l.slice(0,Math.min(3,l.length)), last=l.slice(-3);
const fa=Math.round(first.reduce((a,q)=>a+q.pct,0)/first.length), la=Math.round(last.reduce((a,q)=>a+q.pct,0)/last.length);
const trend = l.length>=4 ? (la>fa? `📈 Improving — up ${la-fa}% since her first quizzes` : la<fa? `A little dip (${fa-la}%) — more practice will help` : `📊 Holding steady`) : `Take a few more to see her trend`;
const rows=l.slice(-8).reverse().map(q=>`<div class="qrow"><span class="qd">${q.date}</span><span class="qbar"><i style="width:${q.pct}%"></i></span><span class="qsc ${q.pct>=80?'g':q.pct>=50?'m':'b'}">${q.score}/${q.total}</span></div>`).join("");
return `<div class="pcard"><div style="font-weight:900;font-size:17px">Quiz scores 🎯 · best ${best}% · avg ${avg}%</div><div style="font-size:13px;opacity:.8;font-weight:700;margin:4px 0 8px">${trend}</div>${rows}</div>`;
})()}

/* ============ DEVICE SYNC LOGIC ============ */
function genCode(){
const a = new Uint8Array(8); (crypto||window.crypto).getRandomValues(a);
return Array.from(a, b=>b.toString(16).padStart(2,"0")).join("");
}
// merge two progress objects so nothing is ever lost
function mergeState(local, remote){
if(!remote || typeof remote!=="object") return local;
const out = local;
out.stars = Math.max(local.stars||0, remote.stars||0);
out.seen = Object.assign({}, remote.seen||{}, local.seen||{});
const m = Object.assign({}, remote.mastered||{});
for(const k in (local.mastered||{})){ if(!m[k] || local.mastered[k] < m[k]) m[k] = local.mastered[k]; }
out.mastered = m;
const d = Object.assign({}, remote.done||{});
for(const k in (local.done||{})){ d[k] = Math.max(d[k]||0, local.done[k]||0); }
out.done = d;
const lg = Object.assign({}, remote.log||{});
for(const k in (local.log||{})){ lg[k] = Math.max(lg[k]||0, local.log[k]||0); }
out.log = lg;
// quiz history: union by timestamp, keep last 50
const qmap={};
(remote.quizzes||[]).concat(local.quizzes||[]).forEach(q=>{ if(q&&q.t) qmap[q.t]=q; });
out.quizzes = Object.values(qmap).sort((a,b)=>a.t-b.t).slice(-50);
// word mastery: keep the higher level reached on any device
const wl = Object.assign({}, remote.wordLevel||{});
for(const k in (local.wordLevel||{})){ wl[k] = Math.max(wl[k]||0, local.wordLevel[k]||0); }
out.wordLevel = wl;
// first-seen dates: keep the earliest
const sd = Object.assign({}, remote.seenDate||{});
for(const k in (local.seenDate||{})){ if(!sd[k] || local.seenDate[k] < sd[k]) sd[k] = local.seenDate[k]; }
out.seenDate = sd;
// missed words: union (a word stays "to win back" until practiced on the device that fixes it)
out.missed = Object.assign({}, remote.missed||{}, local.missed||{});
// spaced-repetition schedule: keep the more-advanced step and the later due date per word
const sr = Object.assign({}, remote.srs||{});
for(const k in (local.srs||{})){ const a=sr[k], b=local.srs[k]; if(!a){ sr[k]=b; } else { sr[k]={ step:Math.max(a.step||0,b.step||0), due:((a.due||"")>(b.due||"")?a.due:b.due), reps:Math.max(a.reps||0,b.reps||0), lapses:Math.max(a.lapses||0,b.lapses||0) }; } }
out.srs = sr;
// badges & daily-path history: union (keep earliest earned date)
const ach = Object.assign({}, remote.achievements||{});
for(const k in (local.achievements||{})){ if(!ach[k] || local.achievements[k] < ach[k]) ach[k]=local.achievements[k]; }
out.achievements = ach;
out.pathDone = Object.assign({}, remote.pathDone||{}, local.pathDone||{});
out.cultureSeen = Object.assign({}, remote.cultureSeen||{}, local.cultureSeen||{});
// settings stay device-local (out===local already keeps speed/scriptMode)
return out;
}
async function syncPull(){
if(!syncCode) return false;
try{
const r = await fetch(SYNC_URL+"?code="+encodeURIComponent(syncCode), {cache:"no-store"});
if(!r.ok) return false;
const remote = await r.json();
if(remote){ state = mergeState(state, remote); try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){} }
return true;
}catch(e){ return false; }
}
async function syncPush(){
if(!syncCode) return false;
try{ await fetch(SYNC_URL+"?code="+encodeURIComponent(syncCode), {method:"POST", body: JSON.stringify(state)}); return true; }
catch(e){ return false; }
}
function syncPushSoon(){ if(!syncCode) return; clearTimeout(syncTimer); syncTimer=setTimeout(syncPush, 1500); }
function syncCreate(){
syncCode = genCode(); try{ localStorage.setItem(SYNC_CODE_KEY, syncCode); }catch(e){}
syncPush().then(()=>{ toast("Sync on ✨"); openParent(); });
}
function syncJoin(){
const el=$("syncInput"); const v=((el&&el.value)||"").trim().toLowerCase().replace(/\s+/g,"");
if(v.length<6){ toast("Enter a valid code"); return; }
syncCode = v; try{ localStorage.setItem(SYNC_CODE_KEY, syncCode); }catch(e){}
syncPull().then(()=>{ syncPush(); toast("Synced ✨"); renderTop(); openParent(); });
}
function syncNow(){ syncPull().then(()=>{ syncPush(); toast("Synced ✨"); renderTop(); openParent(); }); }
function syncDisconnect(){ syncCode=""; try{ localStorage.removeItem(SYNC_CODE_KEY); }catch(e){} toast("Sync off"); openParent(); }

function setSpeed(v){ state.speed=v; saveState(); applySettings(); speak("नमस्ते"); openParent(); }
function setScript(m){ state.scriptMode=m; saveState(); applySettings(); toast(m==='deva'?"Devanagari only ✍️":"Romanized help on"); openParent(); }

if(syncCode){ syncPull().then(ok=>{ if(ok) goHome(); }); }
</script>
